version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: innovate_ai_judge
    ports:
      - "5432:5432"

  analysis:
    build: ./services/analysis
    ports:
      - "8001:8001"

  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: bash -lc "cd apps/web && npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - analysis

  worker:
    image: python:3.11
    working_dir: /app
    volumes:
      - ./:/app
    command: bash -lc "pip install -r services/analysis/requirements.txt && python services/worker/worker.py"
    depends_on:
      - postgres
      - analysis
